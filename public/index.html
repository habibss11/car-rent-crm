<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Аренда авто</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f3f4f6;
padding:15px;
margin:0;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 1px 3px rgba(0,0,0,.1);
}

.total{
background:#16a34a;
color:white;
padding:15px;
border-radius:12px;
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}
</style>
</head>
<body>

<div class="total" id="total">
Загрузка...
</div>

<div id="cars"></div>

<script>
async function loadCars(){

const response = await fetch('/api/cars');
const cars = await response.json();

let total = 0;

document.getElementById('cars').innerHTML =
cars.map(car=>{

total += car.weekly_price;

return `
<div class="card">
<h3>${car.name}</h3>
<p>Доход: ${car.weekly_price} ₽/нед</p>
<p>Арендатор: ${car.renter_name || '-'}</p>
<p>Телефон: ${car.renter_phone || '-'}</p>
<p>Статус: ${car.status}</p>
</div>
`;
}).join('');

document.getElementById('total').innerHTML =
`Доход в неделю: ${total.toLocaleString()} ₽`;
}

loadCars();
</script>

</body>
</html>
